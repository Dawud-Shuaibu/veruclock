<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSD Clock | Clock</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/sidebar.css">
    <link rel="stylesheet" href="./css/clock.css">
</head>

<body>
    <!-- Sidebar Box -->
    <header class="sidebar-main">
        <!-- Sidebar top Menu Box -->
        <div class="top-options-box">
            <div class="sidebar-topmenu">
                <div>
                    <img class="logo1" src="./img/dsd-blue-cropped.png" alt="DSD Logo">
                    <p>DSD Clock</p>
                </div>
                <button class="open-close-sidebar-btn">
                    <img class="logo2" src="./img/dsd-blue-cropped.png" alt="DSD Logo">
                    <svg class="open-bar-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M9 3v18" /><path d="m14 9 3 3-3 3" /></svg>
                    <svg class="close-bar-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M9 3v18" /><path d="m16 15-3-3 3-3" /></svg>
                    <span></span>
                </button>
            </div>
            <h3 class="nav-box-head">Tabs</h3>
            <hr>
            
            <!-- Navigation options box -->
            <nav class="nav-options-box">
                <a href="./pages/clock.html">
                    <button class="sidebar-option-button clock-tab">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><path d="M12 12 L16.5 8.5" /><path d="M12 12 L7.5 10.5" /></svg>
                        <p class="sidebar-option-label">Time & Date</p>
                        <span class="tooltip">Time & Date</span>
                    </button>
                </a>
            </nav>
        </div>

        <div class="bottom-options-box">
            <hr>
            <button class="sidebar-option-button theme-button">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
                <p class="sidebar-option-label">Color theme</p>
                <span class="tooltip">Color Mode</span>
            </button>
        </div>

        <!-- Color Theme Options -->
        <div class="theme-options-box">
            <h3>Color Mode</h3>
            <div>
                <input type="radio" name="color-theme" id="default">
                <label for="default">Browser</label><br>
                <input type="radio" name="color-theme" id="light">
                <label for="light">Light</label><br>
                <input type="radio" name="color-theme" id="dark">
                <label for="dark">Dark</label>
            </div>
        </div>
    </header>

    <main>
        <div class="configs-div">
            <div class="time-source-div">
                <label for="time-source">Time source</label>
                <select id="time-source">
                    <option value="local">Local (system)</option>
                    <option value="remote">Fetch (manual timezone)</option>
                </select>
            </div>
            
            <div class="time-zone-div">
                <label for="time-zone">Time zone</label>
                <select id="time-zone">
                    <option value="local">Auto (use local)</option>
                </select>
            </div>

            <div class="time-format-div">
                <label for="time-format">Time format</label>
                <select id="time-format">
                    <option value="24hour">24 hour</option>
                    <option value="12hour">12 hour</option>
                </select>
            </div>
        </div>

        <div>
            <p class="time"></p>
            <p class="am-pm-symbol"></p>
        </div>

        <p class="date"></p>
    </main>
    
    <script src="./dist/sidebar.js"></script>
    <script src="./dist/clock.js"></script>

</body>

</html>
