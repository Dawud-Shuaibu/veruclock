<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSD Clock</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/sidebar.css">
</head>

<body>
    <!-- Sidebar Box -->
    <header class="sidebar-main">
        <!-- Sidebar top Menu Box -->
        <div class="top-options-box">
            <div class="sidebar-topmenu">
                <div>
                    <img class="logo1" src="./img/dsd-blue-cropped.png" alt="DSD Logo">
                    <p>DSD Clock</p>
                </div>
                <button class="open-close-sidebar-btn">
                    <img class="logo2" src="./img/dsd-blue-cropped.png" alt="DSD Logo">
                    <svg class="open-bar-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M9 3v18" /><path d="m14 9 3 3-3 3" /></svg>
                    <svg class="close-bar-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M9 3v18" /><path d="m16 15-3-3 3-3" /></svg>
                    <span></span>
                </button>
            </div>
            <h3 class="nav-box-head">Tabs</h3>
            <hr>
            <!-- Navigation options box -->
            <nav class="nav-options-box">
                <button class="nav-option-button time-nav-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><path d="M12 12 L16.5 8.5" /><path d="M12 12 L7.5 10.5" /></svg>
                    <p class="nav-option-label">Time</p>
                    <span class="tooltip">Time</span>
                </button>
            </nav>
        </div>

        <div class="bottom-options-box">
            <hr>
            <button class="nav-option-button theme-nav-button">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
                <p class="nav-option-label">Color theme</p>
                <span class="tooltip">Theme</span>
            </button>
        </div>
    </header>

    <script src="./dist/sidebar.js"></script>

</body>

</html>
